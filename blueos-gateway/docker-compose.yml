services:
  blueos-gateway:
    build:
      context: .
      target: production
    container_name: blueos-gateway
    restart: unless-stopped
    network_mode: host
    environment:
      - CONNECTOR_BLUEOS_HOST=192.168.1.248
      - CONNECTOR_SYSTEM_ID=255
      - CONNECTOR_WATCHDOG_TIMEOUT=2.0
      - CONNECTOR_LOG_LEVEL=INFO
      # GPS serial reader disabled (no USB GPS dongle yet)
      - CONNECTOR_GPS_SERIAL_PORT=
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
